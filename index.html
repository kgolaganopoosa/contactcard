<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petal Chain - Business Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .business-card {
            background: linear-gradient(135deg, #000000 0%, #1e3a8a 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">

    <nav class="p-4 border-b border-white/10 bg-black/50 backdrop-blur-md flex items-center gap-3">
        <div class="bg-blue-600 p-1.5 rounded-lg">
            <i data-lucide="briefcase" class="w-5 h-5"></i>
        </div>
        <span class="font-bold tracking-tight text-lg">Petal Chain - Business Card</span>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        
        <div class="business-card w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10">
            <div class="flex flex-col items-center text-center">
                
                <div class="mb-6 relative">
                    <div class="w-28 h-28 rounded-full border-2 border-blue-500/50 p-1">
                        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=300&h=300&auto=format&fit=crop" 
                             alt="Profile" 
                             class="w-full h-full rounded-full object-cover">
                    </div>
                </div>

                <h1 class="text-2xl font-bold tracking-wide">Kgolagano</h1>
                <p class="text-blue-400 text-sm font-medium mb-8">Professional Specialist</p>

                <div class="w-full space-y-5 text-left text-sm text-gray-300">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/10 p-2 rounded-full">
                            <i data-lucide="map-pin" class="w-4 h-4 text-blue-400"></i>
                        </div>
                        <span>Shakung, Pretoria, GP</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="bg-white/10 p-2 rounded-full">
                            <i data-lucide="phone" class="w-4 h-4 text-blue-400"></i>
                        </div>
                        <span>+27 12 345 6789</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="bg-white/10 p-2 rounded-full">
                            <i data-lucide="mail" class="w-4 h-4 text-blue-400"></i>
                        </div>
                        <span>hello@petalchain.co.za</span>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="saveContact()" class="mt-8 group flex items-center gap-3 bg-white text-black font-bold py-4 px-10 rounded-full transition hover:bg-blue-500 hover:text-white active:scale-95">
            <i data-lucide="user-plus" class="w-5 h-5"></i>
            Save to Phone Book
        </button>

    </main>

    <footer class="p-8 text-center bg-black border-t border-white/5">
        <p class="text-gray-500 text-sm">© 2026 Petal Chain Digital</p>
        <p class="text-gray-700 text-[11px] mt-1 italic">Empowering South African Entrepreneurs</p>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        function saveContact() {
            // This creates the standard contact file (.vcf)
            // When opened on a phone, it triggers the "Add Contact" screen in the Phone Book app.
            const contactData = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "FN:Kgolagano",
                "TEL;TYPE=CELL:+27123456789",
                "EMAIL:hello@petalchain.co.za",
                "ADR;TYPE=HOME:;;Shakung;Pretoria;Gauteng;;South Africa",
                "END:VCARD"
            ].join("\n");

            const blob = new Blob([contactData], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", "Kgolagano_Contact.vcf");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
